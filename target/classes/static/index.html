<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Melody.io UAS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col p-6 overflow-hidden font-sans">
    
    <header class="mb-6 flex justify-between items-center border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-bold text-indigo-500"><i class="fas fa-compact-disc mr-2 animate-spin-slow"></i>Melody<span class="text-white">.io</span> Dashboard</h1>
        <p class="text-slate-400 font-mono text-sm bg-slate-800 px-3 py-1 rounded-full border border-slate-700">Generic Logic Architecture</p>
    </header>

    <div class="flex flex-1 gap-6 overflow-hidden">
        <aside class="w-80 bg-slate-800 p-6 rounded-2xl shadow-2xl flex flex-col gap-6 border border-slate-700">
            <div class="space-y-3">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-plus text-indigo-400"></i> Tambah Lagu</h3>
                <input type="number" id="idLagu" placeholder="ID (Angka)" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-indigo-500 outline-none transition">
                <input type="text" id="judulLagu" placeholder="Judul Lagu" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-indigo-500 outline-none transition">
                <input type="text" id="artisLagu" placeholder="Nama Artis" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-indigo-500 outline-none transition">
                <button onclick="addSong()" class="w-full p-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-bold transition shadow-lg shadow-indigo-500/30">Tambahkan</button>
            </div>
            
            <hr class="border-slate-700">

            <div class="space-y-3">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-sort text-indigo-400"></i> Pengurutan Data</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="sortById()" class="p-3 rounded-lg bg-slate-700 hover:bg-slate-600 border border-slate-600 transition text-sm">By ID</button>
                    <button onclick="sortByNama()" class="p-3 rounded-lg bg-slate-700 hover:bg-slate-600 border border-slate-600 transition text-sm">By Judul</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 flex flex-col p-6">
            <div class="flex gap-3 mb-6">
                <input type="text" id="searchKeyword" placeholder="Cari ID atau Judul (Fungsi smartSearch)..." class="flex-1 p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-indigo-500 outline-none transition">
                <button onclick="searchSong()" class="px-6 rounded-lg bg-blue-600 hover:bg-blue-500 font-bold transition shadow-lg shadow-blue-500/30"><i class="fas fa-search mr-2"></i>Cari</button>
                <button onclick="loadPlaylist()" class="px-4 rounded-lg bg-slate-700 hover:bg-slate-600 transition"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="flex-1 overflow-auto border border-slate-700 rounded-xl bg-slate-900">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 sticky top-0">
                        <tr class="text-indigo-400 font-bold">
                            <th class="p-4 border-b border-slate-700">ID Lagu</th>
                            <th class="p-4 border-b border-slate-700">Judul Lagu</th>
                            <th class="p-4 border-b border-slate-700">Nama Artis</th>
                        </tr>
                    </thead>
                    <tbody id="playlistBody" class="divide-y divide-slate-800">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';

        async function loadPlaylist(data = null) {
            let playlist = data;
            if (!playlist) {
                const response = await fetch(`${API_URL}/playlist`);
                playlist = await response.json();
            }

            const body = document.getElementById('playlistBody');
            body.innerHTML = ''; 

            playlist.forEach(lagu => {
                // Menyesuaikan dengan nama variabel di class Lagu lu
                const row = `<tr class="hover:bg-slate-800 transition">
                    <td class="p-4 font-mono text-slate-400">${lagu.idLagu}</td>
                    <td class="p-4 font-semibold">${lagu.judulLagu}</td>
                    <td class="p-4 text-slate-300">${lagu.namaArtis}</td>
                </tr>`;
                body.insertAdjacentHTML('beforeend', row);
            });
        }

        async function addSong() {
            const lagu = {
                id: document.getElementById('idLagu').value,
                judul: document.getElementById('judulLagu').value,
                artis: document.getElementById('artisLagu').value 
            };

            await fetch(`${API_URL}/add-song`, {
                method: 'POST',
                body: JSON.stringify(lagu)
            });

            document.querySelectorAll('input').forEach(i => i.value = '');
            loadPlaylist();
        }

        async function sortById() { await fetch(`${API_URL}/sort-id`); loadPlaylist(); }
        async function sortByNama() { await fetch(`${API_URL}/sort-nama`); loadPlaylist(); }
        async function searchSong() {
            const key = document.getElementById('searchKeyword').value;
            const response = await fetch(`${API_URL}/search?key=${key}`);
            loadPlaylist(await response.json()); 
        }

        loadPlaylist();
    </script>
</body>
</html>
